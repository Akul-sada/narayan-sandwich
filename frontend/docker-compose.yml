version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: restaurant-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: restaurant_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - restaurant-network

  backend:
    build: ./backend
    container_name: restaurant-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/restaurant_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      # Add any other environment variables (Twilio, etc.)
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - restaurant-network

  frontend:
    build: ./frontend
    container_name: restaurant-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local